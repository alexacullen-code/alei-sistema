<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEI - Sistema de Gestión Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } }
        .progress-bar { transition: width 0.5s ease-in-out; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .modal-enter { animation: modalEnter 0.2s ease-out; }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-lg z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-graduation-cap text-2xl"></i>
                <div>
                    <h1 class="text-xl font-bold">ALEI Instituto de Inglés</h1>
                    <p class="text-xs opacity-80">Sistema de Gestión v3.0</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <select id="anio-lectivo" onchange="cambiarAnio()" class="bg-blue-800 border border-blue-700 rounded px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="2025">Año 2025</option>
                    <option value="2026" selected>Año 2026</option>
                    <option value="2027">Año 2027</option>
                </select>
                <button onclick="mostrarAlertas()" class="relative p-2 hover:bg-blue-800 rounded-full transition">
                    <i class="fas fa-bell"></i>
                    <span id="badge-alertas" class="absolute top-0 right-0 bg-red-500 text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </button>
                <button onclick="mostrarModal('reset')" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm font-medium transition pulse-red">
                    <i class="fas fa-exclamation-triangle mr-1"></i>Reset
                </button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-xl overflow-y-auto hide-scrollbar">
            <nav class="p-4 space-y-1">
                <button onclick="navigate('dashboard')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition flex items-center gap-3">
                    <i class="fas fa-chart-line w-5"></i> Dashboard
                </button>
                <button onclick="navigate('caja')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-green-50 text-gray-700 hover:text-green-900 transition flex items-center gap-3">
                    <i class="fas fa-cash-register w-5 text-green-600"></i> Caja Rápida (POS)
                </button>
                <div class="pt-2 pb-1 px-4 text-xs font-semibold text-gray-400 uppercase">Gestión</div>
                <button onclick="navigate('alumnos')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition flex items-center gap-3">
                    <i class="fas fa-users w-5"></i> Alumnos
                </button>
                <button onclick="navigate('pagos')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition flex items-center gap-3">
                    <i class="fas fa-money-bill-wave w-5"></i> Pagos
                </button>
                <button onclick="navigate('libros')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition flex items-center gap-3">
                    <i class="fas fa-book w-5"></i> Libros/Materiales
                </button>
                <button onclick="navigate('deudas')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-red-50 text-gray-700 hover:text-red-900 transition flex items-center gap-3">
                    <i class="fas fa-exclamation-circle w-5 text-red-500"></i> Deudas
                </button>
                <button onclick="navigate('gastos')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition flex items-center gap-3">
                    <i class="fas fa-wallet w-5"></i> Gastos
                </button>
                <div class="pt-2 pb-1 px-4 text-xs font-semibold text-gray-400 uppercase">Utilidades</div>
                <button onclick="navigate('espera')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition flex items-center gap-3">
                    <i class="fas fa-list-ul w-5"></i> Lista de Espera
                </button>
                <button onclick="navigate('reportes')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition flex items-center gap-3">
                    <i class="fas fa-file-alt w-5"></i> Reportes
                </button>
                <button onclick="navigate('backup')" class="nav-btn w-full text-left px-4 py-3 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition flex items-center gap-3">
                    <i class="fas fa-database w-5"></i> Backup/Restore
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto p-6 bg-gray-50">
            <!-- Content injected by JS -->
        </main>
    </div>

    <!-- Modal Genérico -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto modal-enter">
            <!-- Dynamic content -->
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none"></div>

    <script>
        // ==================== CONFIGURACIÓN Y ESTADO ====================
        const currentYear = new Date().getFullYear();
        let appState = {
            anio: 2026,
            db: {
                config: { matriculaBase: 3000, mensualidadBase: 2500, descuento: 150, recargo: 150 },
                tiposMatricula: [
                    { id: 1, nombre: 'Regular', porcentaje: 100, esExcepcion: false },
                    { id: 2, nombre: 'Beca 50%', porcentaje: 50, esExcepcion: false },
                    { id: 3, nombre: 'Hermano', porcentaje: 100, esExcepcion: true, costoFijo: 2000 }
                ],
                niveles: [],
                alumnos: [],
                libros: [],
                pagos: [],
                gastos: [],
                preinscripciones: [],
                alertas: []
            }
        };

        // ==================== LOCALSTORAGE ====================
        function initDB() {
            const saved = localStorage.getItem(`alei_db_${appState.anio}`);
            if (saved) {
                appState.db = JSON.parse(saved);
            } else {
                // Intentar migrar datos de año anterior o crear nuevo
                saveDB();
            }
        }

        function saveDB() {
            localStorage.setItem(`alei_db_${appState.anio}`, JSON.stringify(appState.db));
        }

        function cambiarAnio() {
            appState.anio = parseInt(document.getElementById('anio-lectivo').value);
            initDB();
            navigate('dashboard');
            showToast(`Cambiado al año ${appState.anio}`);
        }

        // ==================== UTILIDADES ====================
        function $(id) { return document.getElementById(id); }
        
        function showToast(message, type = 'success', duration = 3000) {
            const container = $('toast-container');
            const toast = document.createElement('div');
            toast.className = `pointer-events-auto slide-in px-6 py-3 rounded-lg shadow-lg text-white font-medium ${
                type === 'error' ? 'bg-red-600' : type === 'warning' ? 'bg-yellow-500' : 'bg-green-600'
            }`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-times-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i>${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function formatMoney(amount) {
            return '$' + (amount || 0).toLocaleString('es-UY');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('es-UY');
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function calcularDeudaMatricula(alumno) {
            const tipo = appState.db.tiposMatricula.find(t => t.id === alumno.tipoMatriculaId);
            if (!tipo) return 0;
            
            let costo = tipo.costoFijo || (appState.db.config.matriculaBase * tipo.porcentaje / 100);
            const pagado = appState.db.pagos
                .filter(p => p.alumnoId === alumno.id && p.tipo === 'matricula')
                .reduce((sum, p) => sum + p.monto, 0);
            
            return Math.max(0, costo - pagado);
        }

        function calcularDeudaMensual(alumno, mes) {
            // Si es hermano (excepción), usa precio especial sin recargos/descuentos
            if (alumno.esHermano && alumno.precioEspecialHermano) {
                const pagado = appState.db.pagos
                    .filter(p => p.alumnoId === alumno.id && p.tipo === 'mensualidad' && p.mes === mes)
                    .reduce((sum, p) => sum + p.monto, 0);
                return Math.max(0, alumno.precioEspecialHermano - pagado);
            }
            
            const nivel = appState.db.niveles.find(n => n.id === alumno.nivelId);
            const base = nivel?.precioMensual || appState.db.config.mensualidadBase;
            
            const pagado = appState.db.pagos
                .filter(p => p.alumnoId === alumno.id && p.tipo === 'mensualidad' && p.mes === mes)
                .reduce((sum, p) => sum + p.monto, 0);
            
            return Math.max(0, base - pagado);
        }

        function calcularRecargoDescuento(monto, fechaPagoStr, mesPago) {
            const fecha = new Date(fechaPagoStr);
            const dia = fecha.getDate();
            const mesActual = fecha.getMonth() + 1;
            
            // Si paga el mes anterior al que corresponde (adelantado) -> descuento
            // Si paga el mismo mes -> según día
            // Si paga mes siguiente (atrasado) -> recargo
            
            if (mesActual < mesPago) {
                // Pago adelantado del mes siguiente
                return { descuento: appState.db.config.descuento, recargo: 0, montoFinal: monto - appState.db.config.descuento };
            } else if (mesActual === mesPago) {
                if (dia <= 10) {
                    return { descuento: appState.db.config.descuento, recargo: 0, montoFinal: monto - appState.db.config.descuento };
                } else if (dia >= 16) {
                    return { descuento: 0, recargo: appState.db.config.recargo, montoFinal: monto + appState.db.config.recargo };
                }
            } else if (mesActual > mesPago) {
                // Pago atrasado
                return { descuento: 0, recargo: appState.db.config.recargo, montoFinal: monto + appState.db.config.recargo };
            }
            
            return { descuento: 0, recargo: 0, montoFinal: monto };
        }

        // ==================== NAVEGACIÓN ====================
        function navigate(view) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-blue-100', 'text-blue-900', 'font-semibold'));
            event?.target?.classList.add('bg-blue-100', 'text-blue-900', 'font-semibold');
            
            const main = $('main-content');
            main.innerHTML = '<div class="flex justify-center items-center h-64"><i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i></div>';
            
            setTimeout(() => {
                switch(view) {
                    case 'dashboard': renderDashboard(); break;
                    case 'caja': renderCajaRapida(); break;
                    case 'alumnos': renderAlumnos(); break;
                    case 'pagos': renderPagos(); break;
                    case 'libros': renderLibros(); break;
                    case 'deudas': renderDeudas(); break;
                    case 'gastos': renderGastos(); break;
                    case 'espera': renderListaEspera(); break;
                    case 'reportes': renderReportes(); break;
                    case 'backup': renderBackup(); break;
                }
            }, 100);
        }

        // ==================== DASHBOARD ====================
        function renderDashboard() {
            const stats = calcularEstadisticas();
            const hoy = new Date();
            const mesActual = hoy.getMonth() + 1;
            
            let html = `
                <div class="mb-6 flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-gray-800">Dashboard ${appState.anio}</h2>
                    <div class="text-sm text-gray-500">${hoy.toLocaleDateString('es-UY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500">
                        <div class="text-gray-500 text-sm font-medium mb-1">Total Alumnos</div>
                        <div class="text-3xl font-bold text-gray-800">${stats.totalAlumnos}</div>
                        <div class="text-xs text-gray-400 mt-2">Activos este año</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500">
                        <div class="text-gray-500 text-sm font-medium mb-1">Ingresos ${getNombreMes(mesActual)}</div>
                        <div class="text-3xl font-bold text-green-600">${formatMoney(stats.ingresosMes)}</div>
                        <div class="text-xs text-green-600 mt-2"><i class="fas fa-arrow-up"></i> Este mes</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-red-500">
                        <div class="text-gray-500 text-sm font-medium mb-1">Deuda Total</div>
                        <div class="text-3xl font-bold text-red-600">${formatMoney(stats.deudaTotal)}</div>
                        <div class="text-xs text-red-400 mt-2">Por cobrar</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-yellow-500">
                        <div class="text-gray-500 text-sm font-medium mb-1">Libros Pendientes</div>
                        <div class="text-3xl font-bold text-yellow-600">${stats.librosPendientes}</div>
                        <div class="text-xs text-yellow-600 mt-2">Con saldo</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl shadow-md p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-lg text-gray-800">⚠️ Alertas y Vencimientos</h3>
                            <button onclick="generarTodasLasAlertas()" class="text-sm text-blue-600 hover:underline">Actualizar</button>
                        </div>
                        <div class="space-y-3 max-h-96 overflow-y-auto" id="lista-alertas">
                            ${generarHTMLAlertas()}
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-md p-6">
                        <h3 class="font-bold text-lg text-gray-800 mb-4">💰 Resumen Financiero</h3>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                <span class="text-gray-600">Cobrado Matrículas</span>
                                <span class="font-bold text-gray-800">${formatMoney(stats.cobradoMatriculas)}</span>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                <span class="text-gray-600">Cobrado Mensualidades</span>
                                <span class="font-bold text-gray-800">${formatMoney(stats.cobradoMensualidades)}</span>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                <span class="text-gray-600">Cobrado Libros</span>
                                <span class="font-bold text-gray-800">${formatMoney(stats.cobradoLibros)}</span>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-red-50 rounded-lg border border-red-100">
                                <span class="text-red-700 font-medium">Gastos del Mes</span>
                                <span class="font-bold text-red-700">${formatMoney(stats.gastosMes)}</span>
                            </div>
                            <div class="flex justify-between items-center p-4 bg-blue-50 rounded-lg border border-blue-200 mt-4">
                                <span class="text-blue-900 font-bold">Balance Neto</span>
                                <span class="font-bold text-xl text-blue-900">${formatMoney(stats.ingresosMes - stats.gastosMes)}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-6 bg-white rounded-xl shadow-md p-6">
                    <h3 class="font-bold text-lg text-gray-800 mb-4">📊 Estado de Mensualidades - ${getNombreMes(mesActual)}</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50 text-gray-600">
                                <tr>
                                    <th class="px-4 py-2 text-left">Nivel</th>
                                    <th class="px-4 py-2 text-center">Total Alumnos</th>
                                    <th class="px-4 py-2 text-center">Pagaron</th>
                                    <th class="px-4 py-2 text-center">Deben</th>
                                    <th class="px-4 py-2 text-right">% Cobranza</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${appState.db.niveles.map(nivel => {
                                    const alumnosNivel = appState.db.alumnos.filter(a => a.nivelId === nivel.id && a.activo !== false);
                                    const pagaron = alumnosNivel.filter(a => 
                                        appState.db.pagos.some(p => p.alumnoId === a.id && p.tipo === 'mensualidad' && p.mes === mesActual)
                                    ).length;
                                    const deben = alumnosNivel.length - pagaron;
                                    const porcentaje = alumnosNivel.length ? Math.round((pagaron / alumnosNivel.length) * 100) : 0;
                                    return `
                                        <tr class="hover:bg-gray-50">
                                            <td class="px-4 py-3 font-medium">${nivel.nombre}</td>
                                            <td class="px-4 py-3 text-center">${alumnosNivel.length}</td>
                                            <td class="px-4 py-3 text-center text-green-600 font-medium">${pagaron}</td>
                                            <td class="px-4 py-3 text-center text-red-600 font-medium">${deben}</td>
                                            <td class="px-4 py-3 text-right">
                                                <div class="flex items-center justify-end gap-2">
                                                    <div class="w-16 h-2 bg-gray-200 rounded-full overflow-hidden">
                                                        <div class="h-full bg-green-500" style="width: ${porcentaje}%"></div>
                                                    </div>
                                                    <span class="text-xs font-medium">${porcentaje}%</span>
                                                </div>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            $('main-content').innerHTML = html;
            actualizarBadgeAlertas();
        }

        function calcularEstadisticas() {
            const mesActual = new Date().getMonth() + 1;
            const alumnos = appState.db.alumnos.filter(a => a.activo !== false);
            
            const ingresosMes = appState.db.pagos
                .filter(p => {
                    const fecha = new Date(p.fecha);
                    return fecha.getMonth() + 1 === mesActual;
                })
                .reduce((sum, p) => sum + p.monto, 0);
            
            const gastosMes = appState.db.gastos
                .filter(g => {
                    const fecha = new Date(g.fecha);
                    return fecha.getMonth() + 1 === mesActual;
                })
                .reduce((sum, g) => sum + g.monto, 0);
            
            const deudaTotal = alumnos.reduce((sum, a) => sum + calcularDeudaMatricula(a), 0) +
                              alumnos.reduce((sum, a) => sum + calcularDeudaMensual(a, mesActual), 0);
            
            return {
                totalAlumnos: alumnos.length,
                ingresosMes,
                gastosMes,
                deudaTotal,
                librosPendientes: appState.db.libros.filter(l => l.saldo > 0).length,
                cobradoMatriculas: appState.db.pagos.filter(p => p.tipo === 'matricula').reduce((s, p) => s + p.monto, 0),
                cobradoMensualidades: appState.db.pagos.filter(p => p.tipo === 'mensualidad').reduce((s, p) => s + p.monto, 0),
                cobradoLibros: appState.db.pagos.filter(p => p.tipo === 'libro').reduce((s, p) => s + p.monto, 0)
            };
        }

        function generarHTMLAlertas() {
            const hoy = new Date();
            const alertas = [];
            
            // Alertas de cumpleaños (simulado por fecha de inscripción por ahora)
            appState.db.alumnos.forEach(a => {
                if (a.activo === false) return;
                const deudaMat = calcularDeudaMatricula(a);
                const deudaMes = calcularDeudaMensual(a, hoy.getMonth() + 1);
                
                if (deudaMat > 0) {
                    alertas.push({
                        tipo: 'danger',
                        icon: 'fa-exclamation-circle',
                        titulo: `Deuda Matrícula: ${a.nombre}`,
                        desc: `Pendiente: ${formatMoney(deudaMat)}`,
                        accion: `onclick="abrirModalPagoDirecto('${a.id}', 'matricula')"`
                    });
                }
                if (deudaMes > 0) {
                    alertas.push({
                        tipo: 'warning',
                        icon: 'fa-clock',
                        titulo: `Mensualidad pendiente: ${a.nombre}`,
                        desc: `Mes actual - Debe: ${formatMoney(deudaMes)}`,
                        accion: `onclick="abrirModalPagoDirecto('${a.id}', 'mensualidad')"`
                    });
                }
            });
            
            // Libros pendientes
            appState.db.libros.filter(l => l.saldo > 0).forEach(l => {
                const alumno = appState.db.alumnos.find(a => a.id === l.alumnoId);
                if (alumno) {
                    alertas.push({
                        tipo: 'info',
                        icon: 'fa-book',
                        titulo: `Libro pendiente: ${alumno.nombre}`,
                        desc: `${l.titulo} - Saldo: ${formatMoney(l.saldo)}`,
                        accion: `onclick="abrirModalAbonoLibro('${l.id}')"`
                    });
                }
            });
            
            if (alertas.length === 0) {
                return '<div class="text-center text-gray-500 py-8">No hay alertas pendientes</div>';
            }
            
            return alertas.map(a => `
                <div class="flex items-start gap-3 p-3 rounded-lg border-l-4 ${a.tipo === 'danger' ? 'bg-red-50 border-red-500' : a.tipo === 'warning' ? 'bg-yellow-50 border-yellow-500' : 'bg-blue-50 border-blue-500'} cursor-pointer hover:shadow-md transition" ${a.accion}>
                    <i class="fas ${a.icon} mt-1 ${a.tipo === 'danger' ? 'text-red-500' : a.tipo === 'warning' ? 'text-yellow-600' : 'text-blue-500'}"></i>
                    <div class="flex-1">
                        <div class="font-semibold text-sm text-gray-800">${a.titulo}</div>

        let alumnoPOS = null;

        function buscarAlumnoPOS(term) {
            if (term.length < 2) {
                $('pos-resultados').innerHTML = '';
                return;
            }
            const filtrados = appState.db.alumnos.filter(a => 
                a.activo !== false && 
                (a.nombre.toLowerCase().includes(term.toLowerCase()) || a.cedula.includes(term))
            );
            
            $('pos-resultados').innerHTML = filtrados.map(a => `
                <div class="p-3 hover:bg-blue-50 rounded-lg cursor-pointer border border-gray-200 transition flex justify-between items-center" onclick="seleccionarAlumnoPOS('${a.id}')">
                    <div>
                        <div class="font-medium text-gray-800">${a.nombre}</div>
                        <div class="text-xs text-gray-500">CI: ${a.cedula}</div>
                    </div>
                    <i class="fas fa-chevron-right text-gray-400"></i>
                </div>
            `).join('');
        }

        function seleccionarAlumnoPOS(id) {
            alumnoPOS = appState.db.alumnos.find(a => a.id === id);
            if (!alumnoPOS) return;
            
            $('pos-nombre-alumno').textContent = alumnoPOS.nombre;
            const nivel = appState.db.niveles.find(n => n.id === alumnoPOS.nivelId)?.nombre || 'Sin nivel';
            const tipoMat = appState.db.tiposMatricula.find(t => t.id === alumnoPOS.tipoMatriculaId)?.nombre || 'Regular';
            $('pos-info-alumno').textContent = `${nivel} | ${tipoMat}${alumnoPOS.esHermano ? ' | HERMANO' : ''}`;
            
            const deudaMat = calcularDeudaMatricula(alumnoPOS);
            const deudaMes = calcularDeudaMensual(alumnoPOS, new Date().getMonth() + 1);
            $('pos-deuda-total').textContent = formatMoney(deudaMat + deudaMes);
            
            $('pos-resultados').innerHTML = '';
            $('pos-formulario').classList.remove('hidden');
            $('pos-formulario').classList.add('slide-in');
        }

        function actualizarMontoPOS() {
            const concepto = $('pos-concepto').value;
            const campoMes = $('pos-campo-mes');
            const infoCalculo = $('pos-info-calculo');
            
            campoMes.classList.toggle('hidden', concepto !== 'mensualidad');
            
            if (!concepto) {
                infoCalculo.classList.add('hidden');
                return;
            }
            
            let montoBase = 0;
            if (concepto === 'matricula') {
                const tipo = appState.db.tiposMatricula.find(t => t.id === alumnoPOS.tipoMatriculaId);
                montoBase = tipo?.costoFijo || (appState.db.config.matriculaBase * (tipo?.porcentaje || 100) / 100);
            } else if (concepto === 'mensualidad') {
                if (alumnoPOS.esHermano && alumnoPOS.precioEspecialHermano) {
                    montoBase = alumnoPOS.precioEspecialHermano;
                } else {
                    const nivel = appState.db.niveles.find(n => n.id === alumnoPOS.nivelId);
                    montoBase = nivel?.precioMensual || appState.db.config.mensualidadBase;
                }
            }
            
            $('pos-monto-base').textContent = formatMoney(montoBase);
            $('pos-monto').value = montoBase;
            
            // Calcular descuento/recargo si aplica
            calcularDescuentoRecargoPOS();
            infoCalculo.classList.remove('hidden');
        }

        function calcularDescuentoRecargoPOS() {
            const concepto = $('pos-concepto').value;
            const fecha = $('pos-fecha').value;
            const mes = parseInt($('pos-mes')?.value || new Date().getMonth() + 1);
            
            if (concepto !== 'mensualidad' || alumnoPOS.esHermano) {
                $('pos-row-descuento').style.display = 'none';
                $('pos-row-recargo').style.display = 'none';
                $('pos-monto-final').textContent = formatMoney(parseInt($('pos-monto').value) || 0);
                return;
            }
            
            const resultado = calcularRecargoDescuento(parseInt($('pos-monto-base').textContent.replace(/\D/g,'')) || 0, fecha, mes);
            
            $('pos-row-descuento').style.display = resultado.descuento > 0 ? 'flex' : 'none';
            $('pos-row-recargo').style.display = resultado.recargo > 0 ? 'flex' : 'none';
            $('pos-monto-final').textContent = formatMoney(resultado.montoFinal);
            $('pos-monto').value = resultado.montoFinal;
        }

        function calcularVuelto() {
            const recibido = parseInt($('pos-monto').value) || 0;
            const fecha = $('pos-fecha').value;
            const mes = parseInt($('pos-mes')?.value || new Date().getMonth() + 1);
            const concepto = $('pos-concepto').value;
            
            let debePagar = parseInt($('pos-monto-base')?.textContent?.replace(/\D/g,'')) || 0;
            
            if (concepto === 'mensualidad' && !alumnoPOS.esHermano) {
                const resultado = calcularRecargoDescuento(debePagar, fecha, mes);
                debePagar = resultado.montoFinal;
            }
            
            const vuelto = recibido - debePagar;
            const divVuelto = $('pos-vuelto');
            
            if (vuelto > 0) {
                divVuelto.classList.remove('hidden');
                $('pos-vuelto-monto').textContent = formatMoney(vuelto);
            } else {
                divVuelto.classList.add('hidden');
            }
        }

        function procesarPagoPOS() {
            const monto = parseInt($('pos-monto').value);
            const concepto = $('pos-concepto').value;
            const fecha = $('pos-fecha').value;
            const comentarios = $('pos-comentarios').value;
            const mes = parseInt($('pos-mes')?.value);
            
            if (!monto || !concepto) {
                showToast('Complete todos los campos', 'error');
                return;
            }
            
            const pago = {
                id: generateId(),
                alumnoId: alumnoPOS.id,
                tipo: concepto,
                monto,
                fecha,
                mes: concepto === 'mensualidad' ? mes : null,
                comentarios,
                timestamp: new Date().toISOString()
            };
            
            appState.db.pagos.push(pago);
            saveDB();
            
            showToast('Pago registrado correctamente');
            
            // Limpiar
            $('pos-formulario').classList.add('hidden');
            $('pos-busqueda').value = '';
            alumnoPOS = null;
            
            // Actualizar dashboard si está visible
            if ($('main-content').innerHTML.includes('Dashboard')) {
                renderDashboard();
            }
        }

            // Validar cédula
            const existe = appState.db.alumnos.find(a => a.cedula === data.cedula && a.id !== id && a.activo !== false);

            const alumnoData = {
                id: id || generateId(),
                ...data,
                esHermano: data.esHermano === 'on',
                numeroAnual: id ? (appState.db.alumnos.find(a => a.id === id)?.numeroAnual) : (appState.db.alumnos.length + 1),
                activo: true
            };
            
            if (id) {
                const idx = appState.db.alumnos.findIndex(a => a.id === id);
                appState.db.alumnos[idx] = alumnoData;
                showToast('Alumno actualizado');
            } else {
                appState.db.alumnos.push(alumnoData);
                showToast('Alumno registrado correctamente');
            }
            
            saveDB();
            cerrarModal();
            renderAlumnos();
        }

        function guardarLibro(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            
            const libro = {
                id: generateId(),
                alumnoId: data.alumnoId,
                titulo: data.titulo,
                costoTotal: parseInt(data.costoTotal),
                abonado: parseInt(data.primerAbono) || 0,
                saldo: parseInt(data.costoTotal) - (parseInt(data.primerAbono) || 0),
                pagos: parseInt(data.primerAbono) > 0 ? [{
                    fecha: new Date().toISOString().split('T')[0],
                    monto: parseInt(data.primerAbono),
                    comentarios: 'Primer abono al asignar'
                }] : []
            };
            
            appState.db.libros.push(libro);
            
            // Registrar pago si hay abono
            if (parseInt(data.primerAbono) > 0) {
                appState.db.pagos.push({
                    id: generateId(),
                    alumnoId: data.alumnoId,
                    tipo: 'libro',
                    monto: parseInt(data.primerAbono),
                    fecha: new Date().toISOString().split('T')[0],
                    comentarios: `Abono inicial libro: ${data.titulo}. ${data.comentarios || ''}`
                });
            }
            
            saveDB();
            cerrarModal();
            renderLibros();
            showToast('Libro asignado correctamente');
        }

        function registrarAbonoLibro(e, libroId) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            const monto = parseInt(data.monto);
            
            const libro = appState.db.libros.find(l => l.id === libroId);
            libro.abonado += monto;
            libro.saldo -= monto;
            libro.pagos.push({
                fecha: new Date().toISOString().split('T')[0],
                monto,
                comentarios: data.comentarios
            });
            
            appState.db.pagos.push({
                id: generateId(),
                alumnoId: libro.alumnoId,
                tipo: 'libro',
                monto,
                fecha: new Date().toISOString().split('T')[0],
                comentarios: `Abono libro: ${libro.titulo}. ${data.comentarios}`
            });
            
            saveDB();
            cerrarModal();
            renderLibros();
            showToast('Abono registrado');
        }

        function exportarBackup() {
            const data = {
                ...appState.db,
                meta: {
                    anio: appState.anio,
                    fechaExportacion: new Date().toISOString(),
                    version: '3.0'
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `alei_backup_${appState.anio}_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast('Backup descargado');
        }

        function cargarArchivoImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                $('import-text').value = event.target.result;
            };
            reader.readAsText(file);
        }

        function importarBackup(merge = false) {
            try {
                const text = $('import-text').value;
                if (!text) return showToast('Pega el JSON primero', 'error');
                
                const data = JSON.parse(text);
                
                if (!merge) {
                    // Reemplazar todo
                    if (confirm(`¿Reemplazar todos los datos del año ${appState.anio} con los del backup?`)) {
                        appState.db = data;
                        saveDB();
                        showToast('Datos importados correctamente');
                        navigate('dashboard');
                    }
                } else {
                    // Fusionar
                    if (data.alumnos) {
                        data.alumnos.forEach(a => {
                            if (!appState.db.alumnos.find(x => x.cedula === a.cedula)) {
                                appState.db.alumnos.push({...a, id: generateId()});
                            }
                        });
                    }
                    if (data.pagos) appState.db.pagos.push(...data.pagos.map(p => ({...p, id: generateId()})));
                    if (data.libros) appState.db.libros.push(...data.libros.map(l => ({...l, id: generateId()})));
                    saveDB();
                    showToast('Datos fusionados correctamente');
                }
            } catch (e) {
                showToast('Error: JSON inválido', 'error');
            }
        }

                            <i class="fas fa-exclamation-triangle text-3xl text-red-600"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">¿Resetear Sistema?</h3>
                        <p class="text-gray-600 mb-6">Se borrarán todos los datos del año ${appState.anio}. Para confirmar, escriba <strong>RESET_${appState.anio}</strong></p>
                        <input type="text" id="confirm-reset" class="w-full border-2 border-red-300 rounded-lg px-4 py-2 mb-6 text-center font-mono" placeholder="RESET_${appState.anio}">
                        <div class="flex gap-3">
                            <button onclick="ejecutarReset()" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg">Sí, Borrar Todo</button>
                            <button onclick="cerrarModal()" class="flex-1 border border-gray-300 hover:bg-gray-50 py-3 rounded-lg">Cancelar</button>
                        </div>
                    </div>
                `;
                mostrarModalContent(html);
            }
        }

        function ejecutarReset() {
            const input = $('confirm-reset').value;
            if (input !== `RESET_${appState.anio}`) {
                return showToast('Código de confirmación incorrecto', 'error');
            }
            
            appState.db = {
                config: { matriculaBase: 3000, mensualidadBase: 2500, descuento: 150, recargo: 150 },
                tiposMatricula: [
                    { id: 1, nombre: 'Regular', porcentaje: 100, esExcepcion: false },
                    { id: 2, nombre: 'Beca 50%', porcentaje: 50, esExcepcion: false }
                ],
                niveles: [],
                alumnos: [],
                libros: [],
                pagos: [],
                gastos: [],
                preinscripciones: [],
                alertas: []
            };
            
            saveDB();
            cerrarModal();
            navigate('dashboard');
            showToast('Sistema reseteado completamente');
        }

        function cerrarModal() {
            $('modal-overlay').classList.add('hidden');
        }

        // ==================== HELPERS ====================
        function getNombreMes(num) {
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            return meses[num - 1];
        }

        function filtrarTablaAlumnos(term) {
            // Implementación simple de filtro
            const rows = document.querySelectorAll('#tabla-alumnos-body tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term.toLowerCase()) ? '' : 'none';
            });
        }

        // ==================== INICIALIZACIÓN ====================
        window.onclick = (e) => {
            if (e.target === $('modal-overlay')) cerrarModal();
        };

        // Iniciar
        initDB();
        navigate('dashboard');
    </script>
</body>
</html>
