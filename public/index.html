<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEI - Sistema de Gestión Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .sidebar-item:hover { background: linear-gradient(90deg, rgba(59,130,246,0.1) 0%, transparent 100%); }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        
        .status-pagado { background: #dcfce7; color: #166534; }
        .status-parcial { background: #dbeafe; color: #1e40af; }
        .status-pendiente { background: #fee2e2; color: #991b1b; }
        
        .progress-bar { background: #e5e7eb; border-radius: 9999px; overflow: hidden; }
        .progress-fill { background: #3b82f6; height: 100%; transition: width 0.3s; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        input:focus, select:focus, textarea:focus { outline: none; ring: 2px; ring-color: #3b82f6; }
        
        .caja-rapida-btn { transition: all 0.2s; }
        .caja-rapida-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen overflow-hidden">

    <!-- Navbar Superior -->
    <nav class="bg-blue-900 text-white h-16 flex items-center justify-between px-6 shadow-lg z-50 relative">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-6" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
                    <rect width="60" height="30" fill="#012169"/>
                    <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
                    <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4"/>
                    <path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/>
                    <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/>
                </svg>
                <h1 class="text-xl font-bold tracking-wide">ALEI Instituto de Inglés</h1>
            </div>
            <span class="text-blue-200 text-sm hidden md:inline">Sistema de Gestión v2.0</span>
        </div>
        
        <div class="flex items-center gap-4">
            <select id="select-anio" onchange="cambiarAnio()" class="bg-blue-800 border border-blue-700 rounded px-3 py-1 text-sm focus:border-blue-500">
                <option value="2025">Año 2025</option>
                <option value="2026" selected>Año 2026</option>
                <option value="2027">Año 2027</option>
            </select>
            
            <button onclick="mostrarModal('reset')" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm font-medium transition flex items-center gap-2">
                <i class="fas fa-exclamation-triangle"></i>
                <span class="hidden md:inline">Reset Sistema</span>
            </button>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-64px)]">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-md overflow-y-auto">
            <div class="p-4 space-y-1">
                <button onclick="navigate('dashboard')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition">
                    <i class="fas fa-chart-line w-5 text-center"></i> Dashboard
                </button>
                
                <button onclick="navigate('caja')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition bg-green-50 text-green-700 border border-green-200">
                    <i class="fas fa-cash-register w-5 text-center"></i> Caja Rápida
                    <span class="ml-auto text-xs bg-green-600 text-white px-2 py-0.5 rounded-full">POS</span>
                </button>
                
                <div class="pt-2 pb-1 px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Gestión</div>
                
                <button onclick="navigate('alumnos')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition">
                    <i class="fas fa-users w-5 text-center"></i> Alumnos
                </button>
                
                <button onclick="navigate('pagos')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition">
                    <i class="fas fa-money-bill-wave w-5 text-center"></i> Pagos
                </button>
                
                <button onclick="navigate('libros')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition">
                    <i class="fas fa-book w-5 text-center"></i> Libros
                </button>
                
                <button onclick="navigate('deudas')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition">
                    <i class="fas fa-exclamation-circle w-5 text-center"></i> Deudas
                    <span id="badge-deudas" class="ml-auto hidden bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">0</span>
                </button>
                
                <button onclick="navigate('gastos')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition">
                    <i class="fas fa-wallet w-5 text-center"></i> Gastos
                </button>
                
                <button onclick="navigate('espera')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition">
                    <i class="fas fa-list-ol w-5 text-center"></i> Lista Espera
                </button>
                
                <div class="pt-2 pb-1 px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Sistema</div>
                
                <button onclick="navigate('backup')" class="sidebar-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 text-gray-700 hover:text-blue-900 font-medium transition">
                    <i class="fas fa-database w-5 text-center"></i> Backup/Import
                </button>
            </div>
            
            <div class="p-4 mt-auto border-t">
                <div class="bg-blue-50 rounded-lg p-3 text-sm">
                    <div class="font-semibold text-blue-900 mb-1">Usuario:</div>
                    <div class="text-blue-700">Administrador</div>
                    <div class="text-xs text-blue-600 mt-1" id="current-date"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto p-6 bg-gray-50">
            <!-- Contenido dinámico aquí -->
        </main>
    </div>

    <!-- Modal Reset -->
    <div id="modal-reset" class="fixed inset-0 modal-backdrop hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 overflow-hidden animate-fade-in">
            <div class="bg-red-600 text-white px-6 py-4 flex items-center gap-3">
                <i class="fas fa-exclamation-triangle text-2xl"></i>
                <h3 class="text-xl font-bold">Resetear Sistema</h3>
            </div>
            <div class="p-6">
                <p class="text-gray-700 mb-4">Esta acción eliminará <strong>TODOS</strong> los datos permanentemente. Para confirmar, escriba el código de seguridad:</p>
                
                <div class="bg-red-50 border-2 border-red-200 rounded-lg p-3 mb-4 text-center">
                    <span class="font-mono font-bold text-red-800 text-lg">BORRAR_TODO_2026</span>
                </div>
                
                <input type="text" id="codigo-reset" placeholder="Escriba el código aquí" 
                       class="w-full border-2 border-gray-300 rounded-lg px-4 py-3 mb-4 text-center font-mono uppercase tracking-wider focus:border-red-500">
                
                <div class="flex gap-3">
                    <button onclick="cerrarModal('reset')" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 rounded-lg transition">
                        Cancelar
                    </button>
                    <button onclick="ejecutarReset()" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg transition">
                        Confirmar Reset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Ficha Alumno -->
    <div id="modal-ficha" class="fixed inset-0 modal-backdrop hidden flex items-center justify-center z-50 overflow-y-auto py-10">
        <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full mx-4 overflow-hidden animate-fade-in max-h-[90vh] overflow-y-auto">
            <div class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center sticky top-0">
                <h3 class="text-xl font-bold"><i class="fas fa-id-card mr-2"></i> Ficha del Alumno</h3>
                <button onclick="cerrarModal('ficha')" class="text-white hover:text-gray-300 text-2xl">&times;</button>
            </div>
            <div id="ficha-contenido" class="p-6">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <!-- Modal WhatsApp -->
    <div id="modal-whatsapp" class="fixed inset-0 modal-backdrop hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden animate-fade-in">
            <div class="bg-green-600 text-white px-6 py-4 flex items-center gap-3">
                <i class="fab fa-whatsapp text-2xl"></i>
                <h3 class="text-xl font-bold">Enviar Mensaje</h3>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Tipo de mensaje:</label>
                    <select id="whatsapp-tipo" class="w-full border rounded-lg px-3 py-2" onchange="actualizarPreviewWhatsApp()">
                        <option value="cobranza">Cobranza (deuda pendiente)</option>
                        <option value="bienvenida">Bienvenida</option>
                        <option value="recordatorio">Recordatorio general</option>
                    </select>
                </div>
                
                <div class="bg-gray-50 border rounded-lg p-4 mb-4">
                    <div class="text-xs text-gray-500 mb-1">Vista previa:</div>
                    <div id="whatsapp-preview" class="text-gray-800 whitespace-pre-wrap"></div>
                </div>
                
                <div class="flex gap-3">
                    <button onclick="cerrarModal('whatsapp')" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 rounded-lg">
                        Cancelar
                    </button>
                    <button onclick="enviarWhatsApp()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg flex items-center justify-center gap-2">
                        <i class="fab fa-whatsapp"></i> Abrir WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
        // Configuración Global
        const API_URL = '/api';
        let anioActual = 2026;
        let alumnoSeleccionado = null;
        let libroSeleccionado = null;
        let datosTemp = {};

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('es-UY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            navigate('dashboard');
            
            // Verificar conexión
            fetch(`${API_URL}/health`).catch(() => showToast('Error de conexión con el servidor', 'error'));
        });

        // Utilidades
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'error' ? 'bg-red-600' : 'bg-green-600';
            toast.className = `${colors} text-white px-6 py-3 rounded-lg shadow-lg mb-2 flex items-center gap-2`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function formatMoney(amount) {
            return '$' + (amount || 0).toLocaleString('es-UY');
        }

        function cambiarAnio() {
            anioActual = document.getElementById('select-anio').value;
            showToast(`Año cambiado a ${anioActual}`);
            navigate('dashboard');
        }

        function mostrarModal(id) {
            document.getElementById(`modal-${id}`).classList.remove('hidden');
        }

        function cerrarModal(id) {
            document.getElementById(`modal-${id}`).classList.add('hidden');
        }

        async function fetchData(endpoint, options = {}) {
            try {
                const res = await fetch(`${API_URL}/${endpoint}`, {
                    ...options,
                    headers: { 'Content-Type': 'application/json', ...options.headers }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Error en la petición');
                return data;
            } catch (error) {
                showToast(error.message, 'error');
                throw error;
            }
        }

        // Navegación Principal
        async function navigate(section) {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="flex justify-center items-center h-full"><i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i></div>';
            
            switch(section) {
                case 'dashboard': await renderDashboard(); break;
                case 'caja': renderCajaRapida(); break;
                case 'alumnos': await renderAlumnos(); break;
                case 'pagos': await renderPagos(); break;
                case 'libros': await renderLibros(); break;
                case 'deudas': await renderDeudas(); break;
                case 'gastos': await renderGastos(); break;
                case 'espera': await renderEspera(); break;
                case 'backup': renderBackup(); break;
            }
        }

        // DASHBOARD
        async function renderDashboard() {
            try {
                const data = await fetchData(`dashboard?anio=${anioActual}&mes=${new Date().getMonth()+1}`);
                
                document.getElementById('main-content').innerHTML = `
                    <div class="animate-fade-in space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-3xl font-bold text-gray-800">Dashboard ${anioActual}</h2>
                            <span class="text-sm text-gray-500">Actualizado: ${new Date().toLocaleTimeString()}</span>
                        </div>
                        
                        <!-- Stats Cards -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <div class="bg-white rounded-xl shadow-sm p-6 card-hover border-l-4 border-blue-500">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm font-medium text-gray-600 mb-1">Total Alumnos</p>
                                        <h3 class="text-3xl font-bold text-gray-800">${data.total_alumnos}</h3>
                                    </div>
                                    <div class="bg-blue-100 p-3 rounded-lg">
                                        <i class="fas fa-users text-blue-600 text-xl"></i>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-white rounded-xl shadow-sm p-6 card-hover border-l-4 border-green-500">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm font-medium text-gray-600 mb-1">Ingresos Mes</p>
                                        <h3 class="text-3xl font-bold text-green-600">${formatMoney(data.ingresos_mes)}</h3>
                                    </div>
                                    <div class="bg-green-100 p-3 rounded-lg">
                                        <i class="fas fa-arrow-up text-green-600 text-xl"></i>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-white rounded-xl shadow-sm p-6 card-hover border-l-4 border-red-500">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm font-medium text-gray-600 mb-1">Gastos Mes</p>
                                        <h3 class="text-3xl font-bold text-red-600">${formatMoney(data.gastos_mes)}</h3>
                                    </div>
                                    <div class="bg-red-100 p-3 rounded-lg">
                                        <i class="fas fa-arrow-down text-red-600 text-xl"></i>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-white rounded-xl shadow-sm p-6 card-hover border-l-4 ${data.balance >= 0 ? 'border-blue-500' : 'border-orange-500'}">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm font-medium text-gray-600 mb-1">Balance</p>
                                        <h3 class="text-3xl font-bold ${data.balance >= 0 ? 'text-blue-600' : 'text-orange-600'}">${formatMoney(data.balance)}</h3>
                                    </div>
                                    <div class="${data.balance >= 0 ? 'bg-blue-100 text-blue-600' : 'bg-orange-100 text-orange-600'} p-3 rounded-lg">
                                        <i class="fas fa-wallet text-xl"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <!-- Deudores del Mes -->
                            <div class="bg-white rounded-xl shadow-sm p-6">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="text-xl font-bold text-gray-800">
                                        <i class="fas fa-exclamation-triangle text-orange-500 mr-2"></i>
                                        Deben Mensualidad (${data.deben_mes.length})
                                    </h3>
                                </div>
                                <div class="space-y-2 max-h-96 overflow-y-auto">
                                    ${data.deben_mes.length === 0 ? '<p class="text-gray-500 text-center py-4">Todos al día 🎉</p>' : 
                                      data.deben_mes.map(a => `
                                        <div class="flex justify-between items-center p-3 bg-red-50 rounded-lg border border-red-100">
                                            <div>
                                                <div class="font-semibold text-gray-800">${a.nombre}</div>
                                                <div class="text-sm text-gray-600">${a.nivel}</div>
                                            </div>
                                            <button onclick="showWhatsApp(${a.id})" class="text-green-600 hover:text-green-800 p-2" title="Enviar WhatsApp">
                                                <i class="fab fa-whatsapp text-xl"></i>
                                            </button>
                                        </div>
                                      `).join('')}
                                </div>
                            </div>
                            
                            <!-- Libros Pendientes -->
                            <div class="bg-white rounded-xl shadow-sm p-6">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="text-xl font-bold text-gray-800">
                                        <i class="fas fa-book text-blue-500 mr-2"></i>
                                        Libros Pendientes
                                    </h3>
                                </div>
                                <div class="space-y-2 max-h-96 overflow-y-auto">
                                    ${data.libros_pendientes.length === 0 ? '<p class="text-gray-500 text-center py-4">Sin libros pendientes</p>' :
                                      data.libros_pendientes.map(l => `
                                        <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                                            <div class="flex justify-between mb-1">
                                                <span class="font-semibold text-gray-800">${l.alumno_nombre}</span>
                                                <span class="text-red-600 font-bold">${formatMoney(l.saldo)}</span>
                                            </div>
                                            <div class="text-sm text-gray-600 mb-2">${l.titulo}</div>
                                            <div class="w-full bg-gray-200 rounded-full h-2">
                                                <div class="bg-blue-600 h-2 rounded-full" style="width: ${(l.pagado/l.costo_total)*100}%"></div>
                                            </div>
                                        </div>
                                      `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Actualizar badge
                const badge = document.getElementById('badge-deudas');
                if (data.deben_mes.length > 0) {
                    badge.textContent = data.deben_mes.length;
                    badge.classList.remove('hidden');
                }
            } catch (e) {
                document.getElementById('main-content').innerHTML = '<div class="text-center text-red-600">Error cargando dashboard</div>';
            }
        }

        // CAJA RÁPIDA (POS)
        function renderCajaRapida() {
            document.getElementById('main-content').innerHTML = `
                <div class="animate-fade-in max-w-4xl mx-auto">
                    <h2 class="text-3xl font-bold text-gray-800 mb-6">Caja Rápida <span class="text-sm font-normal text-gray-500">(3 clicks para cobrar)</span></h2>
                    
                    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                        <!-- Paso 1: Buscar Alumno -->
                        <div class="p-6 border-b bg-gray-50">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">1. Buscar Alumno</label>
                            <div class="relative">
                                <input type="text" id="caja-busqueda" placeholder="Escriba nombre o cédula..." 
                                       class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 text-lg"
                                       oninput="buscarAlumnoCaja(this.value)">
                                <i class="fas fa-search absolute left-3 top-4 text-gray-400"></i>
                            </div>
                            <div id="caja-resultados" class="mt-2 space-y-1 max-h-48 overflow-y-auto"></div>
                        </div>
                        
                        <!-- Info Alumno Seleccionado -->
                        <div id="caja-info-alumno" class="hidden p-6 bg-blue-50 border-b">
                            <!-- Se llena dinámicamente -->
                        </div>
                        
                        <!-- Paso 2: Concepto y Monto -->
                        <div id="caja-form" class="hidden p-6 space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">2. Concepto</label>
                                    <select id="caja-concepto" onchange="actualizarMontoSugerido()" 
                                            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 text-lg">
                                        <option value="">Seleccione...</option>
                                        <option value="matricula">Matrícula</option>
                                        <option value="mensualidad">Mensualidad</option>
                                        <option value="libro">Libro / Material</option>
                                        <option value="examen">Examen</option>
                                    </select>
                                </div>
                                
                                <div id="campo-mes" class="hidden">
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Mes</label>
                                    <select id="caja-mes" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg">
                                        ${[...Array(12)].map((_, i) => `<option value="${i+1}" ${i+1 === new Date().getMonth()+1 ? 'selected' : ''}>${new Date(2024, i).toLocaleString('es', {month: 'long'})}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">3. Monto</label>
                                    <div class="relative">
                                        <span class="absolute left-4 top-3 text-gray-500 text-lg">$</span>
                                        <input type="number" id="caja-monto" 
                                               class="w-full pl-8 pr-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 text-lg font-bold"
                                               placeholder="0">

        async function buscarAlumnoCaja(term) {
            if (term.length < 3) {
                document.getElementById('caja-resultados').innerHTML = '';
                return;
            }
            
            try {
                const data = await fetchData(`alumnos?busqueda=${encodeURIComponent(term)}&anio=${anioActual}`);
                const div = document.getElementById('caja-resultados');
                
                div.innerHTML = data.map(a => `
                    <div onclick="seleccionarAlumnoCaja(${a.id}, '${a.nombre}', '${a.cedula}', '${a.nivel}', ${a.es_hermano || false}, ${a.precio_especial || 0})" 
                         class="p-3 bg-white border rounded-lg cursor-pointer hover:bg-blue-50 hover:border-blue-300 transition flex justify-between items-center">
                        <div>
                            <div class="font-semibold text-gray-800">${a.nombre}</div>
                            <div class="text-sm text-gray-500">CI: ${a.cedula} | ${a.nivel}</div>
                        </div>
                        ${a.es_hermano ? '<span class="bg-purple-100 text-purple-700 text-xs px-2 py-1 rounded">Herman@</span>' : ''}
                    </div>
                `).join('');
            } catch (e) {}
        }

        function seleccionarAlumnoCaja(id, nombre, cedula, nivel, esHermano, precioEspecial) {
            alumnoSeleccionado = { id, nombre, cedula, nivel, esHermano, precioEspecial };
            document.getElementById('caja-resultados').innerHTML = '';
            document.getElementById('caja-busqueda').value = nombre;
            
            document.getElementById('caja-info-alumno').innerHTML = `
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-2xl font-bold text-blue-900">${nombre}</div>
                        <div class="text-blue-700">${cedula} | ${nivel}</div>
                        ${esHermano ? `<div class="mt-1 inline-block bg-purple-100 text-purple-800 text-sm px-2 py-1 rounded font-medium">Precio especial herman@: ${formatMoney(precioEspecial)}</div>` : ''}
                    </div>
                    <button onclick="resetCaja()" class="text-blue-600 hover:text-blue-800 text-sm underline">Cambiar</button>
                </div>
            `;
            document.getElementById('caja-info-alumno').classList.remove('hidden');
            document.getElementById('caja-form').classList.remove('hidden');
        }

        function resetCaja() {
            alumnoSeleccionado = null;
            document.getElementById('caja-busqueda').value = '';
            document.getElementById('caja-resultados').innerHTML = '';
            document.getElementById('caja-info-alumno').classList.add('hidden');
            document.getElementById('caja-form').classList.add('hidden');
            document.getElementById('caja-concepto').value = '';
            document.getElementById('caja-monto').value = '';
        }

        function actualizarMontoSugerido() {
            const concepto = document.getElementById('caja-concepto').value;
            const campoMes = document.getElementById('campo-mes');
            const ayuda = document.getElementById('caja-ayuda-monto');
            
            campoMes.classList.add('hidden');
            
            if (!alumnoSeleccionado) return;
            
            if (concepto === 'mensualidad') {
                campoMes.classList.remove('hidden');
                if (alumnoSeleccionado.esHermano && alumnoSeleccionado.precioEspecial) {
                    document.getElementById('caja-monto').value = alumnoSeleccionado.precioEspecial;
                    ayuda.textContent = 'Precio especial (sin descuentos/recargos)';
                } else {
                    // Aquí deberías obtener el precio del nivel, usando un valor temporal
                    document.getElementById('caja-monto').value = 2000; // Placeholder
                    ayuda.textContent = 'Se aplicará descuento si paga antes del 10';
                }
            } else if (concepto === 'matricula') {
                document.getElementById('caja-monto').value = 1500; // Placeholder
                ayuda.textContent = 'Costo de matrícula';
            }
        }

        async function registrarPagoCaja() {
            if (!alumnoSeleccionado) return showToast('Seleccione un alumno primero', 'error');
            
            const concepto = document.getElementById('caja-concepto').value;
            const monto = parseInt(document.getElementById('caja-monto').value);
            const comentarios = document.getElementById('caja-comentarios').value;
            const mes = document.getElementById('caja-mes').value;
            
            if (!concepto || !monto) return showToast('Complete todos los campos', 'error');
            
            try {
                await fetchData('pagos', {
                    method: 'POST',
                    body: JSON.stringify({
                        alumno_id: alumnoSeleccionado.id,
                        tipo: concepto,
                        concepto: concepto === 'mensualidad' ? `Mensualidad ${mes}/${anioActual}` : concepto,
                        monto: monto,
                        fecha: new Date().toISOString().split('T')[0],
                        comentarios: comentarios,
                        mes_referencia: mes,
                        anio_referencia: anioActual,
                        es_abono: false
                    })
                });
                
                showToast('¡Pago registrado exitosamente!');
                resetCaja();
                setTimeout(() => navigate('dashboard'), 1000);
            } catch (e) {}
        }

            data.es_hermano = data.es_hermano === 'on';
            data.precio_especial = data.precio_especial ? parseInt(data.precio_especial) : null;
            data.edad = data.edad ? parseInt(data.edad) : null;
            
            try {
                await fetchData('alumnos', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                showToast('Alumno guardado correctamente');
                navigate('alumnos');
            } catch (e) {}
        }

                            <h3 class="text-xl font-bold text-green-700 mb-4"><i class="fas fa-download mr-2"></i>Exportar Datos</h3>
                            <p class="text-gray-600 mb-4">Descargue todos los datos o por sección.</p>
                            
                            <div class="space-y-2">
                                <button onclick="exportarCompleto()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold transition">
                                    Descargar Todo (JSON)
                                </button>
                                <div class="grid grid-cols-2 gap-2 mt-2">
                                    <button onclick="exportarTabla('alumnos')" class="bg-gray-100 hover:bg-gray-200 py-2 rounded text-sm">Solo Alumnos</button>
                                    <button onclick="exportarTabla('pagos')" class="bg-gray-100 hover:bg-gray-200 py-2 rounded text-sm">Solo Pagos</button>
                                    <button onclick="exportarTabla('libros')" class="bg-gray-100 hover:bg-gray-200 py-2 rounded text-sm">Solo Libros</button>
                                    <button onclick="exportarTabla('gastos')" class="bg-gray-100 hover:bg-gray-200 py-2 rounded text-sm">Solo Gastos</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Importar -->
                        <div class="bg-white rounded-xl shadow-sm p-6">
                            <h3 class="text-xl font-bold text-blue-700 mb-4"><i class="fas fa-upload mr-2"></i>Importar Datos</h3>
                            <p class="text-gray-600 mb-4">Pegue el JSON o seleccione archivo.</p>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-semibold mb-2">Seleccione sección:</label>
                                    <select id="import-seccion" class="w-full border rounded-lg px-3 py-2">
                                        <option value="completo">Backup Completo</option>
                                        <option value="alumnos">Solo Alumnos</option>
                                        <option value="libros">Solo Libros</option>
                                        <option value="pagos">Solo Pagos</option>
                                    </select>
                                </div>
                                
                                <textarea id="import-json" placeholder="Pegue aquí el contenido JSON..." 
                                          class="w-full h-32 border rounded-lg px-3 py-2 font-mono text-xs"></textarea>
                                
                                <div class="flex gap-2">
                                    <label class="flex-1 bg-gray-100 hover:bg-gray-200 text-center py-2 rounded-lg cursor-pointer transition">
                                        <i class="fas fa-file-upload mr-2"></i>Subir Archivo
                                        <input type="file" accept=".json" class="hidden" onchange="cargarArchivoImport(this)">
                                    </label>
                                    <button onclick="procesarImport()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-semibold">
                                        Importar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                        <h4 class="font-semibold text-yellow-800 mb-2"><i class="fas fa-info-circle mr-2"></i>Información importante:</h4>
                        <ul class="text-sm text-yellow-700 space-y-1 list-disc list-inside">
                            <li>Al importar, los datos existentes se actualizarán si coinciden los IDs</li>
                            <li>Se recomienda hacer backup antes de importar grandes cantidades de datos</li>
                            <li>El formato debe ser el mismo que el exportado por el sistema</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        async function exportarCompleto() {
            try {
                const data = await fetchData('backup');
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `alei_backup_completo_${anioActual}_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                showToast('Backup descargado');
            } catch (e) {}
        }

        async function exportarTabla(tabla) {
            // Implementar exportación por tabla específica
            showToast('Función específica por tabla - usar backup completo por ahora');
        }

        function cargarArchivoImport(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('import-json').value = e.target.result;
            };
            reader.readAsText(file);
        }

        async function procesarImport() {
            const jsonText = document.getElementById('import-json').value;
            const seccion = document.getElementById('import-seccion').value;
            
            if (!jsonText) return showToast('Pegue el JSON primero', 'error');
            
            try {
                const data = JSON.parse(jsonText);
                
                if (seccion !== 'completo' && !data[seccion]) {
                    return showToast(`El JSON no contiene datos de ${seccion}`, 'error');
                }
                
                const payload = seccion === 'completo' ? data : { [seccion]: data[seccion] || data };
                
                await fetchData('backup', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                showToast('Datos importados correctamente');
                document.getElementById('import-json').value = '';
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
            }
        }

        // RESET
        async function ejecutarReset() {
            const codigo = document.getElementById('codigo-reset').value;
            
            if (codigo !== 'BORRAR_TODO_2026') {
                return showToast('Código incorrecto', 'error');
            }
            
            try {
                await fetchData('reset', {
                    method: 'POST',
                    body: JSON.stringify({ codigo })
                });
                showToast('Sistema reseteado. Recargando...');
                setTimeout(() => location.reload(), 2000);
            } catch (e) {}
        }

        // WHATSAPP
        async function showWhatsApp(alumnoId) {
            try {
                const data = await fetchData(`whatsapp?alumno_id=${alumnoId}&tipo=cobranza`);
                datosTemp.whatsapp = data;
                document.getElementById('whatsapp-preview').textContent = data.mensaje;
                mostrarModal('whatsapp');
            } catch (e) {}
        }

        function enviarWhatsApp() {
            const data = datosTemp.whatsapp;
            if (!data) return;
            
            const mensaje = encodeURIComponent(data.mensaje);
            const telefono = data.telefono ? data.telefono.replace(/\D/g, '') : '';
            window.open(`https://wa.me/598${telefono}?text=${mensaje}`, '_blank');
            cerrarModal('whatsapp');
        }

        // Utilidades tabla
        function filtrarTabla(tablaId, termino) {
            const rows = document.querySelectorAll(`#${tablaId} tr`);
            const lower = termino.toLowerCase();
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(lower) ? '' : 'none';
            });
        }

        // Placeholders para funciones pendientes
        async function renderPagos() { document.getElementById('main-content').innerHTML = '<div class="p-8 text-center">Use Caja Rápida para registrar pagos</div>'; }
        async function renderDeudas() { document.getElementById('main-content').innerHTML = '<div class="p-8 text-center">Ver Dashboard para deudas</div>'; }
        async function renderGastos() { document.getElementById('main-content').innerHTML = '<div class="p-8 text-center">Módulo de gastos - En desarrollo</div>'; }
        async function renderEspera() { document.getElementById('main-content').innerHTML = '<div class="p-8 text-center">Lista de espera - En desarrollo</div>'; }
        function editarAlumno(id) { showToast('Función editar - En desarrollo'); }
        function actualizarPreviewWhatsApp() { /* Implementar cambio de tipo */ }
    </script>
