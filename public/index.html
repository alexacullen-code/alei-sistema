<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALEI Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <header class="bg-slate-900 text-white p-4">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-semibold">ALEI Gestión</h1>
        <nav class="flex gap-2 text-sm">
          <button class="tab px-3 py-1 rounded bg-slate-700" data-tab="dashboard">Dashboard</button>
          <button class="tab px-3 py-1 rounded bg-slate-800" data-tab="alumnos">Alumnos</button>
          <button class="tab px-3 py-1 rounded bg-slate-800" data-tab="pagos">Pagos</button>
          <button class="tab px-3 py-1 rounded bg-slate-800" data-tab="config">Config/Backup</button>
        </nav>
      </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-4">
      <section id="dashboard" class="panel bg-white rounded shadow p-4">
        <h2 class="font-semibold mb-2">Resumen rápido</h2>
        <div class="grid md:grid-cols-3 gap-3 text-sm">
          <div class="p-3 bg-slate-50 rounded"><p class="text-slate-500">Alumnos activos</p><p id="kpiAlumnos" class="text-2xl font-bold">0</p></div>
          <div class="p-3 bg-slate-50 rounded"><p class="text-slate-500">Pagos registrados</p><p id="kpiPagos" class="text-2xl font-bold">0</p></div>
          <div class="p-3 bg-slate-50 rounded"><p class="text-slate-500">Monto total</p><p id="kpiMonto" class="text-2xl font-bold">$0</p></div>
        </div>
      </section>

      <section id="alumnos" class="panel hidden bg-white rounded shadow p-4">
        <h2 class="font-semibold mb-3">Nuevo alumno</h2>
        <form id="formAlumno" class="grid md:grid-cols-3 gap-2 text-sm">
          <input name="nombre" placeholder="Nombre" class="border rounded p-2" required />
          <input name="cedula" placeholder="Cédula" class="border rounded p-2" required />
          <input name="telefono" placeholder="Teléfono" class="border rounded p-2" />
          <input name="edad" type="number" placeholder="Edad" class="border rounded p-2" />
          <input name="direccion" placeholder="Dirección" class="border rounded p-2" />
          <input name="fecha_inscripcion" type="date" class="border rounded p-2" required />
          <select name="nivel_id" class="border rounded p-2" required>
            <option value="1">FCE</option>
            <option value="2">PET</option>
            <option value="3">2nd CH</option>
          </select>
          <select name="tipo_matricula_id" class="border rounded p-2" required>
            <option value="1">Regular</option>
            <option value="2">Matricula x2</option>
            <option value="3">Matricula x3</option>
          </select>
          <button class="bg-slate-900 text-white rounded p-2">Guardar alumno</button>
        </form>

        <h3 class="font-semibold mt-6 mb-2">Listado</h3>
        <div class="overflow-auto"><table class="w-full text-sm"><thead><tr class="text-left border-b"><th>#</th><th>Nombre</th><th>Cédula</th><th>Nivel</th></tr></thead><tbody id="tablaAlumnos"></tbody></table></div>
      </section>

      <section id="pagos" class="panel hidden bg-white rounded shadow p-4">
        <h2 class="font-semibold mb-3">Carga rápida de pago</h2>
        <form id="formPago" class="grid md:grid-cols-3 gap-2 text-sm">
          <input name="alumno_id" placeholder="ID alumno (copiar de tabla)" class="border rounded p-2" required />
          <select name="concepto" class="border rounded p-2">
            <option value="mensualidad">Mensualidad</option>
            <option value="matricula">Matrícula</option>
            <option value="libro">Libro</option>
            <option value="examen">Examen</option>
          </select>
          <input name="fecha" type="date" class="border rounded p-2" required />
          <input name="mes_referencia" type="number" min="1" max="12" placeholder="Mes referencia" class="border rounded p-2" />
          <input name="anio_referencia" type="number" placeholder="Año referencia" class="border rounded p-2" />
          <input name="monto" type="number" step="0.01" placeholder="Monto (opcional)" class="border rounded p-2" />
          <input name="comentarios" placeholder="Comentarios" class="border rounded p-2 md:col-span-2" />
          <button class="bg-slate-900 text-white rounded p-2">Registrar pago</button>
        </form>

        <h3 class="font-semibold mt-6 mb-2">Últimos pagos</h3>
        <div id="listaPagos" class="space-y-2 text-sm"></div>
      </section>

      <section id="config" class="panel hidden bg-white rounded shadow p-4">
        <h2 class="font-semibold mb-3">Backup</h2>
        <button id="btnBackup" class="bg-emerald-700 text-white px-3 py-2 rounded text-sm">Exportar backup JSON</button>
        <pre id="backupOutput" class="mt-3 bg-slate-900 text-green-300 text-xs p-3 rounded overflow-auto max-h-64"></pre>
      </section>

      <div id="toast" class="hidden fixed bottom-4 right-4 bg-slate-900 text-white px-4 py-2 rounded"></div>
    </main>

    <script>
      const $ = (s) => document.querySelector(s);
      const toast = (msg) => {
        const t = $('#toast');
        t.textContent = msg;
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 2200);
      };

      async function api(path, opts = {}) {
        const r = await fetch('/api/' + path, {
          headers: { 'Content-Type': 'application/json' },
          ...opts,
        });
        const json = await r.json();
        if (!r.ok) throw new Error(json.error || 'Error API');
        return json;
      }

      function switchTab(name) {
        document.querySelectorAll('.panel').forEach((el) => el.classList.add('hidden'));
        $('#' + name).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach((b) => b.classList.replace('bg-slate-700', 'bg-slate-800'));
        document.querySelector(`[data-tab="${name}"]`).classList.replace('bg-slate-800', 'bg-slate-700');
      }

      document.querySelectorAll('.tab').forEach((b) => b.onclick = () => switchTab(b.dataset.tab));

      async function refresh() {
        const alumnos = await api('alumnos');
        const pagos = await api('pagos');

        $('#kpiAlumnos').textContent = alumnos.alumnos.length;
        $('#kpiPagos').textContent = pagos.pagos.length;
        $('#kpiMonto').textContent = '$' + pagos.pagos.reduce((a, p) => a + Number(p.monto), 0);

        $('#tablaAlumnos').innerHTML = alumnos.alumnos.map(a =>
          `<tr class="border-b"><td class="py-1">${a.numero_anual}</td><td>${a.nombre}<div class="text-xs text-slate-400">${a.id}</div></td><td>${a.cedula}</td><td>${a.nivel ?? '-'}</td></tr>`
        ).join('');

        $('#listaPagos').innerHTML = pagos.pagos.slice(0, 10).map(p =>
          `<div class="p-2 rounded bg-slate-50 border">${p.fecha} · <b>$${p.monto}</b> · ${p.concepto} · ${p.alumno_nombre ?? 'Sin alumno'}</div>`
        ).join('');
      }

      $('#formAlumno').onsubmit = async (e) => {
        e.preventDefault();
        try {
          const f = new FormData(e.target);
          const payload = Object.fromEntries(f.entries());
          payload.edad = payload.edad ? Number(payload.edad) : null;
          payload.nivel_id = Number(payload.nivel_id);
          payload.tipo_matricula_id = Number(payload.tipo_matricula_id);
          await api('alumnos', { method: 'POST', body: JSON.stringify(payload) });
          e.target.reset();
          toast('Alumno guardado');
          refresh();
        } catch (err) {
          toast(err.message);
        }
      };

      $('#formPago').onsubmit = async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          payload.monto = payload.monto ? Number(payload.monto) : null;
          payload.mes_referencia = payload.mes_referencia ? Number(payload.mes_referencia) : null;
          payload.anio_referencia = payload.anio_referencia ? Number(payload.anio_referencia) : null;
          await api('pagos', { method: 'POST', body: JSON.stringify(payload) });
          e.target.reset();
          toast('Pago registrado');
          refresh();
        } catch (err) {
          toast(err.message);
        }
      };

      $('#btnBackup').onclick = async () => {
        try {
          const data = await api('backup/export');
          $('#backupOutput').textContent = JSON.stringify(data, null, 2);
          toast('Backup generado');
        } catch (err) {
          toast(err.message);
        }
      };

      refresh().catch((e) => toast(e.message));
    </script>
  </body>
</html>
